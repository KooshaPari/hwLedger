[package]
name = "phenotype-event-sourcing"
version = "0.0.1"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/KooshaPari/hwLedger"
description = "Vendored copy of the Phenotype shared event-sourcing crate (SHA-256 hash-chained append-only log). Sourced from KooshaPari/PhenoKits."
rust-version = "1.82"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
sha2 = "0.10"
thiserror = "2"
hex = "0.4"
uuid = { version = "1", features = ["v4", "serde"] }

[dev-dependencies]
tokio = { version = "1.40", features = ["full"] }
