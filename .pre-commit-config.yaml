# Pre-commit hooks - Rust standard configuration
# Install: pre-commit install
# Run manually: pre-commit run --all-files
# Update: pre-commit autoupdate

repos:
  # Standard file quality checks (fast)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Rust formatting and linting (local hooks - assume cargo is installed)
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

  # Block new linter suppressions
  - repo: local
    hooks:
      - id: no-new-suppressions
        name: block new linter suppressions
        entry: bash
        args:
          - -c
          - |
            if git diff --cached --diff-filter=ACM -U0 | grep -E "^\+" | grep -v "^(\+\+\+)" | grep -qE "(#\[allow\(|// *clippy::allow|# noqa|# nolint)"; then
              echo "ERROR: New linter suppressions detected. Fix the code instead."
              exit 1
            fi
        language: system
        pass_filenames: false

# Global settings
default_stages: [pre-commit]
fail_fast: false
minimum_pre_commit_version: 2.15.0

exclude: |
  (?x)^(
    \.git/|
    target/|
    node_modules/|
    dist/|
    build/|
    .*\.lock$
  )
