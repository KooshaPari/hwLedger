[package]
name = "hwledger-journey-record"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "stdio JSON-RPC 2.0 client that wraps PlayCua for per-OS GUI journey recording"
# Traces to: ADR 0035 (PlayCua recording integration); supersedes per-OS
# from-scratch direction previously pursued as a3773560.

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tokio = { workspace = true }
base64 = "0.22"

[dev-dependencies]
tempfile = "3"

[[bin]]
name = "hwledger-journey-record"
path = "src/main.rs"

[lib]
name = "hwledger_journey_record"
path = "src/lib.rs"
