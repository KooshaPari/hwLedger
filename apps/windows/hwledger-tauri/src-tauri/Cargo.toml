[package]
name = "hwledger-tauri"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "hwLedger Tauri 2 client (Windows/Linux)"

[lib]
# The mobile convention crate-type; desktop-only builds also compile.
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-log = "2"
tauri-plugin-dialog = "2"
tauri-plugin-shell = "2"

serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }

# In-process consumption of hwledger-ffi (Tauri host is Rust — no dylib needed).
# The ffi crate re-exports everything as idiomatic Rust via its rlib target.
# For the Planner command we call through to the high-level crates directly
# to keep types ergonomic (avoid raw pointers inside Tauri commands).
hwledger-core = { workspace = true }
hwledger-arch = { workspace = true }
hwledger-ingest = { workspace = true }
hwledger-probe = { workspace = true }
hwledger-hf-client = { workspace = true }

[features]
# Default to the desktop-ready build. No custom protocol needed for MVP.
default = []

# Link the prebuilt `libhwledger_ffi.dll` from the Windows build machine
# instead of compiling it from source. Used by CI when the cross-compile
# artifact is dropped in `src-tauri/vendor/`. See `scripts/link-prebuilt.md`.
prebuilt-ffi = []
