# Per-frame intent narration for the fleet-audit journey.
# Keyed by step index (0-based). The tape emits the `__EXIT_$?__` sentinel
# on the last line so assertions can gate the exit code and full table.
journey: fleet-audit
traces_to: ["FR-FLEET-001", "FR-FLEET-003"]
steps:
  - index: 0
    intent: "Terminal prompt (audit-backed server running in background)"
    assertions:
      must_not_contain: ["Error:", "unexpected argument", "command not found", "panic"]
  - index: 7
    intent: "Audit table with agent events (inference_start, inference_end, probe_telemetry), agent IDs, and telemetry details; trailing __EXIT sentinel"
    assertions:
      # OCR-resilient assertions: on the final keyframe the audit table body
      # is visible but the `hwledger fleet audit` command line, `Details`
      # header, and `__EXIT_$?__` sentinel have all scrolled off the top of
      # the viewport (tesseract only picks up the last ~7 rows). Assert on
      # the columns that ARE on-frame: `Agent`/`Event` header plus
      # `agent-NNN` rows and `inference_*`/`probe_*` event kinds.
      must_contain:
        - "Agent"
        - "Event"
      must_contain_regex:
        - "agent-0*\\d+"
        - "inference_|probe_"
      must_not_contain: ["Error:", "unexpected argument", "command not found", "panic", "thread 'main' panicked"]
