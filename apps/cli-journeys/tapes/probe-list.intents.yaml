# Per-frame intent narration for the probe-list journey.
# Two invocations: table form, then --json form. The last line emits an
# `__EXIT_$?__` sentinel.
journey: probe-list
traces_to: ["FR-TEL-001", "FR-TEL-002"]
steps:
  - index: 0
    intent: "Terminal prompt ready to run `hwledger probe list`"
    assertions:
      must_not_contain: ["Error:", "unexpected argument", "command not found", "panic"]
  - index: 2
    intent: "JSON output from `hwledger probe list --json` with schema/timestamp_ms/devices array (Apple Silicon GPU, metal backend, total_vram, utilization), trailing __EXIT sentinel"
    assertions:
      must_contain:
        - "schema"
        - "hwledger.v"
        - "devices"
        - "metal"
        - "Silicon"
        - "total_vram"
        - "__EXIT_"
      must_not_contain: ["Error:", "unexpected argument", "command not found", "panic", "thread 'main' panicked"]
