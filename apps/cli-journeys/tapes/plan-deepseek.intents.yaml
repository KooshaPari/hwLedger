# Per-frame intent narration for the plan-deepseek journey.
# Two planner invocations (2K then 32K) demonstrating KV growth under
# longer context. The tape emits an `__EXIT_$?__` sentinel on the last
# line so the final keyframe can be gated.
journey: plan-deepseek
traces_to: ["FR-PLAN-003"]
steps:
  - index: 0
    intent: "Terminal at prompt, ready to run planner"
    assertions:
      must_not_contain: ["Error:", "unexpected argument", "command not found", "panic"]
  - index: 2
    intent: "Second invocation (`--seq 32768 --users 2`) renders the VRAM table with MLA attention, weights/KV/activations/overhead/total rows; trailing __EXIT sentinel"
    assertions:
      must_contain:
        - "hwledger plan"
        - "deepseek"
        - "Attention Kind"
        - "Mla"
        - "kv_"
        - "rank"
        - "qk_rope"
        - "Weights"
        - "KV Cache"
        - "Total"
        - "__EXIT_"
      must_not_contain: ["Error:", "unexpected argument", "command not found", "panic", "thread 'main' panicked"]
