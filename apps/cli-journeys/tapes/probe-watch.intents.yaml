# Per-frame intent narration for the probe-watch journey.
# The tape streams probe telemetry as NDJSON for a few seconds, then
# Ctrl+C's out and emits a `probe-watch-done __EXIT_$?__` sentinel line
# so the assertion layer can gate the shutdown frame.
journey: probe-watch
traces_to: ["FR-TEL-001", "FR-TEL-002"]
steps:
  - index: 0
    intent: "Terminal prompt ready for `hwledger probe watch`"
    assertions:
      must_not_contain: ["Error:", "unexpected argument", "command not found", "panic"]
  - index: 2
    intent: "Streaming NDJSON samples (schema, timestamp_ms, devices: Apple Silicon GPU) with Ctrl+C shutdown and trailing `probe-watch-done __EXIT` sentinel"
    assertions:
      must_contain:
        - "schema"
        - "hwledger.v"
        - "devices"
        - "metal"
        - "Silicon"
        - "probe-watch-done"
        - "__EXIT_"
      must_not_contain: ["Error:", "unexpected argument", "command not found", "panic", "thread 'main' panicked"]
