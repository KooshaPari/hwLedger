# Per-frame intent narration for the traceability-report journey.
# The tape writes a markdown trace report to /tmp/trace.md, previews it
# with `head`, then counts FR rows with grep. The final line emits an
# `__EXIT_$?__` sentinel.
journey: traceability-report
traces_to: ["FR-TRACE-001", "FR-TRACE-002", "FR-TRACE-003"]
steps:
  - index: 0
    intent: "Terminal prompt, ready to run hwledger-traceability"
    assertions:
      must_not_contain: ["unexpected argument", "command not found", "panic"]
  - index: 3
    intent: "Markdown report preview + FR grep count: tabular rows show FR-PLAN-00x, FR-TEL-00x, FR-INF-00x, FR-FLEET-00x with PART status; trailing __EXIT sentinel"
    assertions:
      must_contain:
        - "FR-PLAN"
        - "FR-TEL"
        - "FR-INF"
        - "FR-FLEET"
        - "PART"
        - "trace.md"
        - "__EXIT_"
      must_not_contain: ["unexpected argument", "command not found", "panic", "thread 'main' panicked"]
