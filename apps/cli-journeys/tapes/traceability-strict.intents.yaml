# Per-frame intent narration for the traceability-strict journey.
# Strict mode fails on incomplete impl coverage, so the final sentinel is
# `__EXIT_1__`. The intent is to prove the CI gate actually blocks regressions.
journey: traceability-strict
traces_to: ["FR-TRACE-003", "FR-TRACE-004"]
steps:
  - index: 0
    intent: "Terminal prompt ready to invoke hwledger-traceability twice (non-strict then --strict)"
    assertions:
      must_not_contain: ["unexpected argument", "command not found", "panic", "thread 'main' panicked"]
  - index: 2
    intent: "Strict mode output listing FRs with missing impl (FR-FLEET, FR-UI, FR-UX-VERIFY, FR-TRACE, NFR); trailing __EXIT_1__ sentinel proving the gate exits non-zero"
    assertions:
      must_contain:
        - "NFR-"
        - "missing imp"
        - "VERIFY"
        - "__EXIT_1__"
      must_not_contain: ["unexpected argument", "command not found", "panic", "thread 'main' panicked"]
      expected_exit: 1
