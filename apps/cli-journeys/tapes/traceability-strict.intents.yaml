journey: traceability-strict
steps:
  - index: 0
    intent: "Command typed: `cargo run -q -p hwledger-traceability --` (default, non-strict)"
    assertions:
      must_not_contain: ["unexpected argument", "command not found", "panic"]
  - index: 1
    intent: "Report prints with exit code 0 even though some FRs are missing impl rows"
    assertions:
      must_not_contain: ["unexpected argument", "command not found", "panic"]
  - index: 2
    intent: "Command typed: `cargo run -q -p hwledger-traceability -- --strict` — strict mode fails, listing FRs with missing implementation and exiting non-zero"
    assertions:
      # `error:` is acceptable here because strict mode legitimately prints
      # errors about missing implementations. We still guard against clap /
      # panic crashes.
      must_not_contain: ["unexpected argument", "command not found", "thread 'main' panicked"]
