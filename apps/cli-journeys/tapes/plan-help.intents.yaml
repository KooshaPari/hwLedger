# Per-frame intent narration for the plan-help journey.
# The tape dumps `hwledger plan --help` and exits. The last frame contains
# the tail of the options list and the `__EXIT_$?__` sentinel.
journey: plan-help
traces_to: ["FR-PLAN-003"]
steps:
  - index: 0
    intent: "Terminal prompt awaiting command"
    assertions:
      must_not_contain: ["Error:", "unexpected argument", "command not found", "panic"]
  - index: 9
    intent: "Tail of plan --help options: --users, --batch, --weight-quant, --kv-quant, --json, --export, --no-color; trailing __EXIT sentinel"
    assertions:
      must_contain:
        - "--users"
        - "--batch"
        - "--weight-quant"
        - "--kv-quant"
        - "--json"
        - "--export"
        - "--no-color"
        - "__EXIT_"
      must_not_contain: ["Error:", "unexpected argument", "command not found", "panic", "thread 'main' panicked"]
