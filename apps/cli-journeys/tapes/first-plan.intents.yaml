# Per-frame intent narration for the first-plan journey.
# Keyed by step index (0-based). Verifier maps 1:1 onto manifest steps;
# extra frames fall back to "<journey intent> (frame N)".
#
# `assertions` blocks are consumed by `phenotype-journey assert`: OCR'd frame
# text must match the contain / not_contain rules. The tape emits an
# `__EXIT_$?__` sentinel on the last line so `expected_exit` can gate the
# exit code against the last keyframe.
journey: first-plan
traces_to: ["FR-PLAN-001", "FR-PLAN-003"]
steps:
  - index: 0
    intent: "Terminal prompt, ready to run the planner"
    assertions:
      must_not_contain: ["error:", "unexpected argument", "command not found", "panic"]
  - index: 13
    intent: "Full VRAM breakdown table: Llama 70B GQA attention, weights/KV/activations/overhead totals, plus the __EXIT sentinel line"
    assertions:
      must_contain:
        - "Attention Kind"
        - "Gqa"
        - "Parameters"
        - "Weights"
        - "KV Cache"
        - "Total"
        - "__EXIT_"
      must_not_contain: ["Error:", "unexpected argument", "command not found", "panic", "thread 'main' panicked"]
