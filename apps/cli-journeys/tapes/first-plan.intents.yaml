# Per-frame intent narration for the first-plan journey.
# Keyed by step index (0-based). Verifier maps 1:1 onto manifest steps;
# extra frames fall back to "<journey intent> (frame N)".
#
# `assertions` blocks are consumed by `phenotype-journey assert`: OCR'd frame
# text must match the contain / not_contain rules; expected_exit gates the
# last keyframe against an `__EXIT_<N>__` sentinel.
journey: first-plan
steps:
  - index: 0
    intent: "Terminal prompt, ready to run the planner"
    assertions:
      must_not_contain: ["error:", "unexpected argument", "command not found", "panic"]
  - index: 1
    intent: "Command typed: `hwledger plan tests/golden/llama3-70b.json --seq 4096 --users 4`"
    assertions:
      must_contain: ["hwledger plan", "llama3-70b"]
      must_not_contain: ["error:", "unexpected argument", "command not found", "panic"]
  - index: 2
    intent: "Architecture detection line: Llama 3 70B with grouped-query attention"
    assertions:
      must_contain: ["Llama"]
      must_not_contain: ["error:", "unexpected argument", "command not found", "panic"]
  - index: 3
    intent: "VRAM breakdown table: weights, KV cache, activations, overhead"
    assertions:
      must_contain: ["VRAM"]
      must_not_contain: ["error:", "unexpected argument", "command not found", "panic"]
  - index: 4
    intent: "Summary row: total VRAM for 4 concurrent users and TP recommendation"
    assertions:
      must_not_contain: ["error:", "unexpected argument", "command not found", "panic"]
      expected_exit: 0
