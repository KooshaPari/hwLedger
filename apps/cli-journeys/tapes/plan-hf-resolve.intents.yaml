# Per-frame intent narration for the plan-hf-resolve journey.
#
# Three planner invocations exercise the model-resolver dispatch table:
#   1. bare HF repo id      → HfRepo { repo_id = "deepseek-ai/DeepSeek-V3" }
#   2. full HF URL          → HfRepo (revision extracted from URL)
#   3. `gold:` shortcut     → GoldenFixture(tests/golden/deepseek-v3.json)
#
# The final command emits `__EXIT_$?__` so the trailing keyframe is gated.
journey: plan-hf-resolve
traces_to: ["FR-HF-001"]
steps:
  - index: 0
    intent: "Terminal at prompt, ready to invoke the planner via the HF resolver"
    assertions:
      must_not_contain: ["error:", "unexpected argument", "command not found", "panic"]
  - index: 1
    intent: "First invocation resolves a bare HF repo id (`deepseek-ai/DeepSeek-V3`) and renders the VRAM table with MLA attention"
    assertions:
      must_contain:
        - "hwledger plan"
        - "DeepSeek-V3"
        - "Mla"
        - "Attention Kind"
        - "Weights"
        - "KV Cache"
        - "Total"
      must_not_contain: ["error:", "unexpected argument", "panic", "thread 'main' panicked"]
  - index: 2
    intent: "Planner output from the first invocation is fully rendered and the second invocation resolves a full HF URL (`https://huggingface.co/mistralai/Mistral-7B-v0.1`)"
    assertions:
      must_contain:
        - "hwledger plan"
        - "Attention Kind"
        - "Weights"
        - "KV Cache"
        - "Total"
      must_not_contain: ["error:", "unexpected argument", "panic", "thread 'main' panicked"]
  - index: 3
    intent: "Third invocation uses the `gold:deepseek-v3` fixture shortcut at 32K seq; MLA attention + VRAM breakdown + __EXIT_0__ sentinel"
    assertions:
      must_contain:
        - "hwledger plan"
        - "gold:deepseek-v3"
        - "Mla"
        - "Attention Kind"
        - "Weights"
        - "KV Cache"
        - "Total"
      expected_exit: 0
      must_not_contain: ["error:", "unexpected argument", "panic", "thread 'main' panicked"]
