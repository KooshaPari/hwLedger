# Per-frame intent narration for the hf-search-deepseek journey.
# The tape first runs an anonymous search for DeepSeek-V3 and then one-shot
# plans memory for `deepseek-ai/DeepSeek-V3`, printing an __EXIT_ sentinel.
journey: hf-search-deepseek
traces_to: ["FR-HF-001", "FR-PLAN-003"]
steps:
  - index: 0
    intent: "Terminal prompt awaiting the hwledger search command"
    assertions:
      must_not_contain: ["Error:", "panic", "command not found"]
  - index: 4
    intent: "Search result table listing deepseek models with downloads + likes + library"
    assertions:
      must_contain:
        - "deepseek"
        - "repo-id"
        - "downloads"
      must_not_contain: ["Error:", "panic", "unauthorized"]
  - index: 9
    intent: "Planner output for deepseek-ai/DeepSeek-V3 showing MLA attention + KV breakdown + __EXIT sentinel"
    assertions:
      must_contain:
        - "deepseek"
        - "MLA"
        - "Attention Kind"
        - "__EXIT_0__"
      must_not_contain:
        - "Error:"
        - "panic"
        - "thread 'main' panicked"
        - "model is gated"
