journey: install-cargo
steps:
  - index: 0
    intent: "Terminal prompt"
    assertions:
      must_not_contain: ["error:", "unexpected argument", "command not found", "panic"]
  - index: 1
    intent: "Command typed: `cargo install --path crates/hwledger-cli --root /tmp/hwl-install`"
    assertions:
      must_not_contain: ["error:", "unexpected argument", "command not found", "panic"]
  - index: 2
    intent: "Cargo compiling hwledger-cli dependencies"
    assertions:
      must_not_contain: ["error:", "unexpected argument", "command not found", "panic"]
  - index: 3
    intent: "Cargo linking final hwledger-cli binary"
    assertions:
      must_not_contain: ["error:", "unexpected argument", "command not found", "panic"]
  - index: 4
    intent: "Install success line: binary placed under /tmp/hwl-install/bin/"
    assertions:
      must_not_contain: ["error:", "unexpected argument", "command not found", "panic"]
  - index: 5
    intent: "`hwledger-cli --version` prints semver and build metadata"
    assertions:
      must_not_contain: ["error:", "unexpected argument", "command not found", "panic"]
  - index: 6
    intent: "`hwledger-cli --help` prints subcommand summary"
    assertions:
      must_not_contain: ["error:", "unexpected argument", "command not found", "panic"]
  - index: 7
    intent: "Subcommands visible: plan, ingest, probe, fleet, version, completions"
    assertions:
      must_not_contain: ["error:", "unexpected argument", "command not found", "panic"]
  - index: 8
    intent: "Prompt returned, ready for next command"
    assertions:
      must_not_contain: ["error:", "unexpected argument", "command not found", "panic"]
      expected_exit: 0
