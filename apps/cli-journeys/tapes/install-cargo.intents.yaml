# Per-frame intent narration for the install-cargo journey.
# The tape installs hwledger-cli from source via cargo, checks --version,
# then --help. The last line emits the `__EXIT_$?__` sentinel.
journey: install-cargo
traces_to: ["FR-INF-001"]
steps:
  - index: 0
    intent: "Terminal prompt, about to run cargo install"
    assertions:
      must_not_contain: ["Error:", "unexpected argument", "command not found", "panic"]
  - index: 3
    intent: "hwledger-cli --help prints subcommand summary (plan, ingest, probe, fleet, completions, version) with options; trailing __EXIT sentinel"
    assertions:
      must_contain:
        - "hwledger-cli"
        - "Usage"
        - "Commands"
        - "plan"
        - "ingest"
        - "probe"
        - "fleet"
        - "__EXIT_"
      must_not_contain: ["Error:", "unexpected argument", "command not found", "panic", "thread 'main' panicked"]
