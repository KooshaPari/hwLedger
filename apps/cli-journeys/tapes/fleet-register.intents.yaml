# Per-frame intent narration for the fleet-register journey.
# Keyed by step index (0-based). The tape emits the `__EXIT_$?__` sentinel
# on the last line so assertions can gate the final fleet-status table.
journey: fleet-register
traces_to: ["FR-FLEET-001", "FR-FLEET-002"]
steps:
  - index: 0
    intent: "Terminal prompt (server launched silently in the background)"
    assertions:
      must_not_contain: ["Error:", "unexpected argument", "command not found", "panic"]
  - index: 11
    intent: "Fleet status table reflecting the just-registered agent: Version, Uptime, Connected Agents, Total VRAM; trailing __EXIT sentinel"
    assertions:
      must_contain:
        - "hwledger fleet status"
        - "Property"
        - "Value"
        - "Version"
        - "Uptime"
        - "Connected Agents"
        - "__EXIT_"
      must_not_contain: ["Error:", "unexpected argument", "command not found", "panic", "thread 'main' panicked"]
