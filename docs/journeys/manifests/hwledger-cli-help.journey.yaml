        - "(plan|ingest|probe|fleet|ledger)"
      must_not_contain:
        - "error:"
      ocr_required: true
  - index: 3
    slug: help-flags
    assertions:
      must_contain:
        - "Flags:"
      must_contain_regex:
        - "(--config|--format|--verbose)"
      must_not_contain:
        - "error:"
      expected_exit: 0
      ocr_required: true
