name: Feature Request
description: Suggest an improvement for hwLedger
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: Describe the problem and the outcome you want.
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [High, Medium, Low]
    validations:
      required: true
  - type: input
    id: use-case
    attributes:
      label: Use case
      placeholder: Who needs this and why?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      placeholder: What is missing today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: What should hwLedger do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options: [CLI, Library, Contract interaction, Documentation, Other]
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
