version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule: { interval: "weekly", day: "monday" }
    groups:
      cargo:
        patterns: ["*"]
    open-pull-requests-limit: 10
  - package-ecosystem: "cargo"
    directory: "/apps/windows/hwledger-tauri/src-tauri"
    schedule: { interval: "weekly", day: "monday" }
    groups:
      cargo:
        patterns: ["*"]
    open-pull-requests-limit: 5
  - package-ecosystem: "npm"
    directory: "/"
    schedule: { interval: "weekly", day: "wednesday" }
    groups:
      npm:
        patterns: ["*"]
    open-pull-requests-limit: 10
  - package-ecosystem: "npm"
    directory: "/apps/streamlit/journeys"
    schedule: { interval: "weekly", day: "wednesday" }
    groups:
      npm:
        patterns: ["*"]
    open-pull-requests-limit: 5
  - package-ecosystem: "npm"
    directory: "/apps/windows/hwledger-tauri"
    schedule: { interval: "weekly", day: "wednesday" }
    groups:
      npm:
        patterns: ["*"]
    open-pull-requests-limit: 5
  - package-ecosystem: "npm"
    directory: "/docs-site"
    schedule: { interval: "weekly", day: "wednesday" }
    groups:
      npm:
        patterns: ["*"]
    open-pull-requests-limit: 5
  - package-ecosystem: "npm"
    directory: "/tools/journey-remotion"
    schedule: { interval: "weekly", day: "wednesday" }
    groups:
      npm:
        patterns: ["*"]
    open-pull-requests-limit: 5
  - package-ecosystem: "pip"
    directory: "/apps/streamlit"
    schedule: { interval: "weekly", day: "thursday" }
    groups:
      python:
        patterns: ["*"]
    open-pull-requests-limit: 10
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule: { interval: "weekly", day: "friday" }
    groups:
      actions:
        patterns: ["*"]
    open-pull-requests-limit: 5
