name: rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read

jobs:
  # Skipping macOS + Windows runners on free tier; local quality gates cover them.
  # See ~/.claude/CLAUDE.md GitHub Actions Billing Constraint section.
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features --no-fail-fast

  secrets:
    runs-on: ubuntu-latest
    # Only scan on PRs (BASE/HEAD diff) or when explicitly dispatched; push runs
    # often have BASE==HEAD which trufflehog rejects.
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: trufflehog verified-only
        uses: trufflesecurity/trufflehog@3fc0c2aa6648d54242e4af6fbfde0701796e4fb0  # was: @main
        with:
          extra_args: --only-verified

  # macOS XCFramework + release pipeline runs LOCALLY via lefthook, not CI.
  # See lefthook.yml + scripts/release.sh. Rationale: macos-latest runners are
  # billed at 10x Linux minutes; we have a $0 budget for that after account
  # default limits. Local signing is strictly better for key material safety too.
