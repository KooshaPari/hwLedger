# Self-hosted rich-journey renders.
#
# Runs on a self-hosted Linux runner only — hosted macOS/Windows runners are
# skipped per the Phenotype-wide GitHub Actions billing policy (see CLAUDE.md
# -> "GitHub Actions Billing Constraint"). This is an acceptance gate for
# rich renders, not a publish step.
name: journey-rich-render

on:
  # Nightly: 10:00 UTC = 03:00 PT. Re-renders any journey whose manifest
  # hash has drifted from its stored recording_rich_manifest_sha256.
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - 'tools/journey-remotion/**'
      - 'crates/hwledger-journey-render/**'
      - 'docs-site/public/**/manifest.verified.json'
      - 'apps/cli-journeys/**/scene-spec.json'
      - 'apps/streamlit/journeys/**/scene-spec.json'

jobs:
  render:
    # Self-hosted only. The Phenotype org does not run hosted runners.
    runs-on: [self-hosted, linux]
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'rich-render')
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Remotion deps
        working-directory: tools/journey-remotion
        run: bun install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Build the render CLI
        run: cargo build --release -p hwledger-journey-render

      - name: Batch-render every journey under docs-site/public
        # Idempotent: unchanged manifests are skipped via SHA-256 match.
        run: |
          ./target/release/hwledger-journey-render all docs-site/public

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload MP4 artefacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: rich-renders
          path: docs-site/public/**/*.rich.mp4
          if-no-files-found: error
          retention-days: 14

      # On a scheduled (nightly) run, if any manifest hash changed we open
      # a PR back to main. On pull_request triggers we leave changes in
      # place and let the reviewer commit.
      - name: Open PR with drift
        if: github.event_name == 'schedule' && steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(journeys): nightly rich-render refresh"
          branch: automated/rich-render-refresh
          title: "Nightly rich-render refresh"
          body: |
            Automated nightly re-render of hwLedger journeys via
            `hwledger-journey-render all docs-site/public`.

            One or more `manifest.verified.json` files have drifted from
            their stored `recording_rich_manifest_sha256`; the
            corresponding rich MP4s have been regenerated.
