# CI validation for workflow correctness and docs integrity.
# Runs on every push/PR to validate:
#   * Workflow YAML syntax
#   * Rich-media stub validation
#
# Not a full build/test pipeline — that will be added when Rust code lands.

name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-docs:
    name: Lint docs
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.1.3

      - name: Install docs dependencies
        working-directory: docs
        run: bun install

      - name: Validate rich-media stubs
        working-directory: docs
        run: bun run journey:lint

  validate-workflows:
    name: Validate workflows
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Check YAML syntax
        run: |
          errors=0
          for f in .github/workflows/*.yml; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>/dev/null \
              && echo "OK: $f" \
              || { echo "FAIL: $f"; errors=$((errors+1)); }
          done
          exit $errors
