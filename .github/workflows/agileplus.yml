name: AgilePlus State Tracking

on:
  push:
    branches: [main]
    paths:
      - 'kitty-specs/hwledger-v1-macos-mvp/**'
      - 'docs/adr/**'
      - 'Cargo.toml'
      - 'crates/**'
      - '.github/workflows/agileplus.yml'
  workflow_dispatch:

jobs:
  agileplus-status:
    name: Track hwledger-v1-macos-mvp Feature State
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git-cliff and analysis

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'AgilePlus'

      - name: Install AgilePlus from sibling workspace (if present)
        id: install-agileplus
        continue-on-error: true
        run: |
          if [ -d ../AgilePlus ]; then
            cd ../AgilePlus
            cargo install --path . --locked
            agileplus --version
          else
            echo "AgilePlus sibling workspace not available in CI; skipping state tracking."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - name: Initialize AgilePlus database (if needed)
        if: steps.install-agileplus.outputs.skip != 'true'
        run: |
          if [ ! -f .agileplus/agileplus.db ]; then
            mkdir -p .agileplus
            agileplus init --repo . 2>&1 || true
          fi

      - name: List feature state
        id: feature-state
        if: steps.install-agileplus.outputs.skip != 'true'
        run: |
          STATE=$(agileplus list --db .agileplus/agileplus.db -v 2>&1 | grep hwledger-v1-macos-mvp | awk '{print $3}')
          echo "feature_state=${STATE}" >> $GITHUB_OUTPUT
          echo "Feature state: ${STATE}"

      - name: Validate governance (report-only)
        if: steps.feature-state.outputs.feature_state == 'implementing' || steps.feature-state.outputs.feature_state == 'validated'
        continue-on-error: true
        run: |
          agileplus validate \
            --feature hwledger-v1-macos-mvp \
            --format markdown \
            --force \
            --output /tmp/validation-report.md
          echo "Validation report:"
          cat /tmp/validation-report.md || echo "(no report generated)"

      - name: Post feature state summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## AgilePlus Feature Tracking

          | Feature | State |
          |---------|-------|
          | hwledger-v1-macos-mvp | ${{ steps.feature-state.outputs.feature_state }} |

          ### Next Steps
          - For Planned state: Run `agileplus implement --feature hwledger-v1-macos-mvp` locally
          - For Implementing state: Run `agileplus validate --feature hwledger-v1-macos-mvp` to check compliance
          - For Validated state: Run `agileplus ship --feature hwledger-v1-macos-mvp --dry-run` to preview merge
          - For Shipped state: Run `agileplus retrospective --feature hwledger-v1-macos-mvp` to generate report

          See `docs/reports/AGILEPLUS-STATE-MACHINE.md` for full workflow documentation.
          EOF

      - name: Check Cargo build (verification)
        run: |
          cargo check --workspace --message-format=short 2>&1 | head -20 || true

      - name: Summary
        run: |
          echo "AgilePlus tracking complete."
          echo "Feature: hwledger-v1-macos-mvp"
          echo "State: ${{ steps.feature-state.outputs.feature_state }}"
          echo "Docs: docs/reports/AGILEPLUS-STATE-MACHINE.md"
          echo "Deferred work: ADR-0008 (WP21 — Apple codesign pending user enrollment)"
