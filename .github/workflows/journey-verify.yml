name: Journey Verify

on:
  workflow_dispatch:
  push:
    paths:
      - 'docs/journeys/**'
      - 'docs/operations/journey-traceability.md'
      - 'docs/governance/journeys.md'
  pull_request:
    paths:
      - 'docs/journeys/**'
      - 'docs/operations/journey-traceability.md'
      - 'docs/governance/journeys.md'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: phenotype-journey verify
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Checkout phenotype-journeys toolchain
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
        with:
          repository: KooshaPari/phenotype-journeys
          path: phenotype-journeys
          ref: f6426af97b42325452df3b7c1681f29a6be52002

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # v-latest
        with:
          toolchain: stable

      - name: Cache phenotype-journey-core
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v-latest
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            phenotype-journeys/target
          key: ${{ runner.os }}-phenotype-journey-core-${{ hashFiles('phenotype-journeys/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-phenotype-journey-core-

      - name: Build phenotype-journey CLI
        working-directory: phenotype-journeys
        run: cargo build --release --bin phenotype-journey

      - name: Verify journey manifests
        run: |
          set -euo pipefail
          if [ ! -x phenotype-journeys/target/release/phenotype-journey ]; then
            echo "phenotype-journey binary not built" && exit 1
          fi
          for manifest in docs/journeys/manifests/*.journey.yaml; do
            [ -e "$manifest" ] || continue
            echo "Verifying $manifest"
            ./phenotype-journeys/target/release/phenotype-journey verify \
              --manifest "$manifest" \
              --docs-root docs/journeys
          done
