name: CI (self-hosted)

# Runs on the user's local self-hosted macOS runner (see
# docs-site/reference/ci-local.md). GitHub Actions billing is exhausted, so
# hosted runners (macos-*, windows-*, ubuntu-*) are avoided here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-local-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: [self-hosted, self-hosted-mac]
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version
          bun --version || true
          uv --version || true

      - name: Cargo test (workspace)
        run: cargo test --workspace --locked

      - name: Docs-site build (bun)
        working-directory: docs-site
        run: |
          if [ -f package.json ]; then
            bun install --frozen-lockfile || bun install
            bun run build
          else
            echo "no docs-site package.json; skipping"
          fi
