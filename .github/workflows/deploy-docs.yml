name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Clone phenodocs (for @phenotype/docs shared config)
        run: git clone --depth 1 https://github.com/KooshaPari/phenodocs.git /tmp/phenodocs

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.1.3

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Install dependencies
        working-directory: docs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # Install consumer dependencies first so node_modules/vitepress exists
          bun install
          # Link @phenotype/docs from the cloned phenodocs workspace
          mkdir -p node_modules/@phenotype
          ln -sf /tmp/phenodocs/packages/docs node_modules/@phenotype/docs
          # Expose vitepress to phenodocs so its config/index.ts can resolve it
          mkdir -p /tmp/phenodocs/node_modules
          ln -sf "$(pwd)/node_modules/vitepress" /tmp/phenodocs/node_modules/vitepress

      - name: Build VitePress site
        working-directory: docs
        env:
          GITHUB_PAGES: "true"
          # No custom domain — site is served at kooshapari.github.io/hwLedger/
          # Keep PHENOTYPE_CUSTOM_DOMAIN unset so base stays /hwLedger/
        run: bun run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@98ef48e41587a300b82de4cf298aa98b57b2faae # v1.0.10
        with:
          # srcDir: '.' → VitePress outputs to docs/.vitepress/dist
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
