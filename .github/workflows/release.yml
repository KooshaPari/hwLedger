name: macOS Release (Code Sign + DMG + Notarize + GitHub Release)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Install SPM/Sparkle dependencies
        run: |
          # Ensure Xcode is fully set up
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
          # Sparkle may be installed later via SPM

      - name: Import Developer ID Application Certificate
        env:
          APPLE_DEVELOPER_ID_CERT_P12: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          if [ -z "$APPLE_DEVELOPER_ID_CERT_P12" ] || [ -z "$APPLE_DEVELOPER_ID_CERT_PASSWORD" ]; then
            echo "Error: Developer ID cert secrets not configured"
            exit 1
          fi

          # Create temp keychain
          KEYCHAIN_PATH="$(mktemp -d)/signing.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security default-keychain -s "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          # Import certificate
          echo "$APPLE_DEVELOPER_ID_CERT_P12" | base64 -d > /tmp/cert.p12
          security import /tmp/cert.p12 \
              -k "${KEYCHAIN_PATH}" \
              -P "$APPLE_DEVELOPER_ID_CERT_PASSWORD" \
              -T /usr/bin/codesign \
              -T /usr/bin/security \
              2>&1 | grep -v "already exists" || true

          rm -f /tmp/cert.p12

          # Verify import
          security find-identity -v "${KEYCHAIN_PATH}" | grep "Developer ID Application" || {
            echo "Error: Failed to import Developer ID cert"
            exit 1
          }

      - name: Build XCFramework (release)
        run: |
          ./scripts/build-xcframework.sh --release

      - name: Build and bundle app (release + codesign)
        env:
          SPARKLE_FEED_URL: https://kooshapari.github.io/hwLedger/appcast.xml
        run: |
          # Note: SPARKLE_PUBLIC_KEY would be set dynamically if we had keys pre-generated
          # For now, the app builds without it (optional in Info.plist)
          apps/macos/HwLedgerUITests/scripts/bundle-app.sh --codesign release

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "dmg_name=hwLedger-${VERSION}.dmg" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        run: |
          mkdir -p apps/macos/build
          ./scripts/build-dmg.sh \
              --app apps/macos/build/HwLedger.app \
              --out "apps/macos/build/hwLedger-${{ steps.version.outputs.version }}.dmg"

      - name: Notarize DMG
        if: env.NOTARY_CREDS_PRESENT == 'true'
        env:
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          DMG_PATH: apps/macos/build/hwLedger-${{ steps.version.outputs.version }}.dmg
        run: |
          # Verify credentials are present
          if [ -z "$APPLE_NOTARY_KEY_ID" ] || [ -z "$APPLE_NOTARY_ISSUER_ID" ] || [ -z "$APPLE_NOTARY_KEY_BASE64" ]; then
            echo "Warning: Notarization credentials not fully configured"
            echo "DMG is codesigned but not notarized"
            echo "To notarize later, run locally:"
            echo "  export APPLE_NOTARY_KEY_ID='<KEY_ID>'"
            echo "  export APPLE_NOTARY_ISSUER_ID='<ISSUER_ID>'"
            export NOTARY_CREDS_PRESENT=false
            exit 0
          fi

          # Decode .p8 file
          echo "$APPLE_NOTARY_KEY_BASE64" | base64 -d > /tmp/AuthKey.p8
          chmod 600 /tmp/AuthKey.p8

          # Notarize
          export APPLE_NOTARY_KEY_PATH="/tmp/AuthKey.p8"
          ./scripts/notarize.sh "${DMG_PATH}"

          rm -f /tmp/AuthKey.p8

      - name: Check notarization credentials before generating appcast
        id: notary_check
        run: |
          if [ -n "${{ secrets.APPLE_NOTARY_KEY_ID }}" ] && \
             [ -n "${{ secrets.APPLE_NOTARY_ISSUER_ID }}" ] && \
             [ -n "${{ secrets.APPLE_NOTARY_KEY_BASE64 }}" ]; then
            echo "creds_present=true" >> "$GITHUB_OUTPUT"
          else
            echo "creds_present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Sparkle appcast
        if: steps.notary_check.outputs.creds_present == 'true'
        env:
          SPARKLE_PRIVATE_KEY_PATH: ${{ runner.temp }}/.sparkle_key
        run: |
          if [ -n "${{ secrets.SPARKLE_PRIVATE_KEY_BASE64 }}" ]; then
            echo "${{ secrets.SPARKLE_PRIVATE_KEY_BASE64 }}" | base64 -d > "${SPARKLE_PRIVATE_KEY_PATH}"
            chmod 600 "${SPARKLE_PRIVATE_KEY_PATH}"
            ./scripts/generate-appcast.sh apps/macos/build
            rm -f "${SPARKLE_PRIVATE_KEY_PATH}"
          else
            echo "Warning: Sparkle private key not available; skipping appcast generation"
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/macos/build/hwLedger-${{ steps.version.outputs.version }}.dmg
            docs-site/public/appcast.xml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit appcast.xml to docs-site (if generated)
        if: steps.notary_check.outputs.creds_present == 'true' && hashFiles('docs-site/public/appcast.xml') != ''
        run: |
          cd docs-site
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/appcast.xml
          git commit -m "docs: update Sparkle appcast for ${{ steps.version.outputs.version }}" || echo "No changes to commit"
          git push || echo "Failed to push (expected in detached HEAD state after release)"

      - name: Verify DMG signature
        run: |
          codesign -v --verbose=2 "apps/macos/build/hwLedger-${{ steps.version.outputs.version }}.dmg"
          echo "✓ DMG codesignature verified"

      - name: Release summary
        run: |
          echo "=== Release Complete ==="
          echo "Tag:           ${{ github.ref_name }}"
          echo "DMG:           hwLedger-${{ steps.version.outputs.version }}.dmg"
          echo "Location:      https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          echo "Notarized:     ${{ steps.notary_check.outputs.creds_present }}"
          echo ""
          if [ "${{ steps.notary_check.outputs.creds_present }}" = "true" ]; then
            echo "Sparkle feed:  https://kooshapari.github.io/hwLedger/appcast.xml"
            echo "Update check:  Automatic via in-app updater"
          else
            echo "Note: DMG is codesigned but not notarized."
            echo "Users will see a warning when opening. To notarize:"
            echo "  1. Configure notarization secrets (see docs/reports/WP21-APPLE-DEV-SECRETS.md)"
            echo "  2. Retag and push: git tag -d v1.0.0 && git tag v1.0.0 && git push --tags"
          fi
