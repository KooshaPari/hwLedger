openapi: 3.1.0
info:
  title: hwLedger Fleet Server API
  version: 0.0.1
  description: |
    Central ledger server for hwLedger fleet management. Provides agent
    registration, heartbeat, job dispatch, fleet discovery, and an
    append-only hash-chained audit ledger (FR-FLEET-001..008).

    Seed OpenAPI spec scaffolded per audit #118. Pattern mirrors
    AgilePlus#366 (hand-authored seed + CI drift check gated off until
    utoipa annotations land). Not yet source-of-truth; handlers in
    `crates/hwledger-server/src/routes.rs` remain canonical.
  license:
    name: Apache-2.0
servers:
  - url: https://localhost:8443
    description: Local mTLS server (require_admin_cert=true)
  - url: http://localhost:8080
    description: Local plain HTTP (X-Admin-Cert header gates admin routes)
tags:
  - name: agents
    description: Agent registration, heartbeat, lifecycle
  - name: jobs
    description: Job dispatch and reporting
  - name: fleet
    description: Fleet discovery (SSH, Tailscale, rentals, placement)
  - name: audit
    description: Append-only hash-chained audit ledger (FR-FLEET-006)
  - name: health
    description: Service health
paths:
  /v1/agents/register:
    post:
      tags: [agents]
      summary: Register or refresh a fleet agent
      description: Validates bootstrap token, signs CSR, returns RegistrationAck. FR-FLEET-001, FR-FLEET-002.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AgentRegistration' }
      responses:
        '201':
          description: Agent registered
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegistrationAck' }
        '401': { $ref: '#/components/responses/AuthError' }
        '500': { $ref: '#/components/responses/InternalError' }
  /v1/agents/{agent_id}/heartbeat:
    post:
      tags: [agents]
      summary: Submit an agent heartbeat
      description: FR-FLEET-001, FR-FLEET-002.
      parameters:
        - { $ref: '#/components/parameters/AgentId' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Heartbeat' }
      responses:
        '204': { description: Accepted }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/agents:
    get:
      tags: [agents]
      summary: List registered agents (admin)
      responses:
        '200':
          description: Agent list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Agent' }
        '401': { $ref: '#/components/responses/AuthError' }
  /v1/agents/{agent_id}:
    delete:
      tags: [agents]
      summary: Deregister an agent
      description: FR-FLEET-001.
      parameters:
        - { $ref: '#/components/parameters/AgentId' }
      responses:
        '204': { description: Deregistered }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/agents/{agent_id}/probe:
    post:
      tags: [agents]
      summary: Trigger SSH probe for a given agent
      description: FR-FLEET-003.
      parameters:
        - { $ref: '#/components/parameters/AgentId' }
      responses:
        '202': { description: Probe scheduled }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/agents/{agent_id}/jobs:
    get:
      tags: [jobs]
      summary: Poll pending dispatch orders for an agent
      description: FR-FLEET-008.
      parameters:
        - { $ref: '#/components/parameters/AgentId' }
      responses:
        '200':
          description: Pending dispatch orders
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DispatchOrder' }
  /v1/jobs:
    post:
      tags: [jobs]
      summary: Create a job dispatch
      description: FR-FLEET-008.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DispatchOrder' }
      responses:
        '201':
          description: Job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id: { type: string, format: uuid }
  /v1/jobs/{job_id}/report:
    post:
      tags: [jobs]
      summary: Report job completion
      description: FR-FLEET-008.
      parameters:
        - in: path
          name: job_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DispatchReport' }
      responses:
        '204': { description: Report accepted }
  /v1/fleet/ssh_probe:
    get:
      tags: [fleet]
      summary: SSH agentless probe of configured hosts
      description: FR-FLEET-003.
      responses:
        '200':
          description: Probe results
          content:
            application/json:
              schema:
                type: array
                items: { type: object, additionalProperties: true }
  /v1/fleet/tailscale:
    get:
      tags: [fleet]
      summary: List Tailscale peers discovered in tailnet
      description: FR-FLEET-004.
      responses:
        '200':
          description: Peer list
          content:
            application/json:
              schema:
                type: array
                items: { type: object, additionalProperties: true }
  /v1/fleet/rentals:
    get:
      tags: [fleet]
      summary: Cloud/colo rental offerings
      description: FR-FLEET-005.
      responses:
        '200':
          description: Rental catalog
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
  /v1/fleet/placement:
    get:
      tags: [fleet]
      summary: Workload placement suggestions
      description: FR-FLEET-007.
      responses:
        '200':
          description: Placement recommendations
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
  /v1/audit:
    get:
      tags: [audit]
      summary: List audit log entries
      description: Append-only hash-chained audit log. FR-FLEET-006.
      responses:
        '200':
          description: Audit entries
          content:
            application/json:
              schema:
                type: array
                items: { type: object, additionalProperties: true }
  /v1/audit/verify-chain:
    get:
      tags: [audit]
      summary: Verify audit ledger hash chain integrity
      description: FR-FLEET-006.
      responses:
        '200':
          description: Chain verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  entries_checked: { type: integer }
  /v1/audit/policy:
    get:
      tags: [audit]
      summary: Effective audit retention policy
      description: FR-FLEET-006.
      responses:
        '200':
          description: Retention policy
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/health:
    get:
      tags: [health]
      summary: Service health probe
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }
components:
  parameters:
    AgentId:
      in: path
      name: agent_id
      required: true
      schema: { type: string }
      description: Agent identifier (UUID or hostname-derived).
  responses:
    AuthError:
      description: Authentication or authorization error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorBody' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorBody' }
    InternalError:
      description: Unhandled server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorBody' }
  schemas:
    ErrorBody:
      type: object
      required: [error]
      properties:
        error: { type: string }
        reason: { type: string }
    AgentRegistration:
      type: object
      required: [hostname, bootstrap_token, cert_csr_pem]
      properties:
        hostname: { type: string }
        bootstrap_token: { type: string }
        cert_csr_pem: { type: string, description: PEM-encoded CSR }
        labels:
          type: object
          additionalProperties: { type: string }
    RegistrationAck:
      type: object
      required: [agent_id, agent_cert_pem]
      properties:
        agent_id: { type: string }
        agent_cert_pem: { type: string, description: PEM-encoded signed certificate }
        ca_cert_pem: { type: string }
    Heartbeat:
      type: object
      required: [agent_id, timestamp_ms]
      properties:
        agent_id: { type: string }
        timestamp_ms: { type: integer, format: int64 }
        telemetry:
          type: object
          additionalProperties: true
    Agent:
      type: object
      required: [id, hostname, registered_at_ms]
      properties:
        id: { type: string }
        hostname: { type: string }
        registered_at_ms: { type: integer, format: int64 }
        last_seen_ms: { type: integer, format: int64, nullable: true }
    DispatchOrder:
      type: object
      required: [job_id, kind]
      properties:
        job_id: { type: string, format: uuid }
        kind: { type: string }
        payload:
          type: object
          additionalProperties: true
        target_agent: { type: string, nullable: true }
    DispatchReport:
      type: object
      required: [job_id, state]
      properties:
        job_id: { type: string, format: uuid }
        state:
          type: string
          enum: [pending, running, succeeded, failed, cancelled]
        output:
          type: object
          additionalProperties: true
        error: { type: string, nullable: true }
    HealthResponse:
      type: object
      required: [status, uptime_s, agent_count]
      properties:
        status: { type: string, example: ok }
        uptime_s: { type: integer, format: int64 }
        agent_count: { type: integer, format: int64 }
