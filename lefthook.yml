# Lefthook — local git hooks for hwLedger.
#
# Installed via `lefthook install` (run once after clone).
# Push of a v* tag triggers the full macOS release pipeline LOCALLY via
# scripts/release.sh — no billed CI runners.
#
# Fast by default: pre-commit runs only on staged files. Full workspace
# checks run on pre-push.

pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "crates/**/*.rs"
      run: |
        for f in {staged_files}; do
          manifest=$(echo "$f" | sed -E 's|(crates/[^/]+)/.*|\1/Cargo.toml|')
          [ -f "$manifest" ] && rustfmt --edition 2021 --check "$f" || true
        done
      stage_fixed: false

    secrets-files:
      run: |
        if git diff --cached --name-only | grep -E '\.(p8|p12|pem|key)$' | grep -v '^vendor/' | grep -v '^tests/fixtures/'; then
          echo "Refusing to commit a .p8 / .p12 / .pem / .key file. Move it out of the index."
          exit 1
        fi

    trufflehog:
      run: |
        if ! command -v trufflehog >/dev/null 2>&1; then
          echo "trufflehog not installed; skipping. brew install trufflesecurity/trufflehog/trufflehog"
          exit 0
        fi
        # Trufflehog's git driver can't open a worktree's `.git` file
        # (gitdir indirection errors with "not a directory"). In that case
        # scan the staged filesystem diff instead; on the canonical checkout
        # keep the original git-aware mode.
        if [ -f .git ]; then
          files=$(git diff --cached --name-only --diff-filter=ACM)
          if [ -z "$files" ]; then
            echo "no staged files to scan"; exit 0
          fi
          echo "$files" | xargs -I{} trufflehog filesystem --only-verified --fail {} || exit 1
        else
          trufflehog git file://. --since-commit HEAD --only-verified --fail
        fi

pre-push:
  parallel: false
  commands:
    unverified-manifests:
      # Hard gate: every manifest.json under docs-site/public/ and apps/ MUST
      # have a sibling manifest.verified.json. Prevents the docs site from
      # ever rendering "No verified manifest yet — this journey ran but hasn't
      # been blackbox-verified". ALWAYS strict — never gated by
      # HWLEDGER_TAPE_GATE. If this fails, run:
      #   phenotype-journey verify --manifests-dir <dir> --tapes-dir <...>
      # to regenerate the missing manifest.verified.json files.
      run: |
        set -euo pipefail
        PHENOTYPE_JOURNEYS_ROOT="${PHENOTYPE_JOURNEYS_ROOT:-/Users/kooshapari/CodeProjects/Phenotype/repos/phenotype-journeys}"
        if command -v phenotype-journey >/dev/null 2>&1; then
          BIN="phenotype-journey"
        elif [ -f "${PHENOTYPE_JOURNEYS_ROOT}/Cargo.toml" ]; then
          BIN="cargo run --quiet --manifest-path ${PHENOTYPE_JOURNEYS_ROOT}/Cargo.toml --bin phenotype-journey --"
        else
          echo "phenotype-journey not available — install phenotype-journeys or set PHENOTYPE_JOURNEYS_ROOT"
          exit 1
        fi
        ${BIN} check-verified --root docs-site/public --root apps

    docs-health:
      # Proactive docs-health gate: mermaid / LaTeX / broken-link / missing
      # asset / placeholder / tiny-video checks across docs-site/. Blocks on
      # Error findings; warnings are surfaced but non-blocking until the
      # backlog in docs-site/quality/docs-health-backlog.md is drained.
      glob: "{docs-site,apps}/**/*.md"
      run: cargo run -q -p hwledger-docs-health -- --root docs-site --fail-on error

    workspace-verify:
      run: |
        set -euo pipefail
        for m in crates/*/Cargo.toml; do
          cargo fmt --manifest-path "$m" -- --check
        done
        cargo clippy --workspace --all-targets -- -D warnings
        cargo test --workspace --no-fail-fast

    tape-assertions:
      # Ground-truth assertion gate: every verified manifest must pass
      # `phenotype-journey assert --strict`. Strict by default — any
      # violation blocks the push. Set HWLEDGER_TAPE_GATE=warn for a
      # temporary, non-blocking run (e.g. while triaging an OCR regression).
      #
      # OCR: Catppuccin Mocha + JetBrains Mono renders '0' and 'l' poorly
      # with vanilla tesseract, so we default to an upscale+negate preprocessing
      # pipeline via PHENOTYPE_JOURNEY_OCR_CMD. Install ImageMagick (`brew
      # install imagemagick`) and Tesseract (`brew install tesseract`).
      run: |
        set -uo pipefail
        MANIFESTS_DIR="apps/cli-journeys/manifests"
        if [ ! -d "$MANIFESTS_DIR" ]; then
          echo "no cli-journeys manifests dir; skipping"
          exit 0
        fi
        PHENOTYPE_JOURNEYS_ROOT="${PHENOTYPE_JOURNEYS_ROOT:-/Users/kooshapari/CodeProjects/Phenotype/repos/phenotype-journeys}"
        if command -v phenotype-journey >/dev/null 2>&1; then
          BIN="phenotype-journey"
        elif [ -f "${PHENOTYPE_JOURNEYS_ROOT}/Cargo.toml" ]; then
          BIN="cargo run --quiet --manifest-path ${PHENOTYPE_JOURNEYS_ROOT}/Cargo.toml --bin phenotype-journey --"
        else
          echo "phenotype-journey not available — install phenotype-journeys or set PHENOTYPE_JOURNEYS_ROOT"
          exit 1
        fi
        export PHENOTYPE_JOURNEY_OCR_CMD="${PHENOTYPE_JOURNEY_OCR_CMD:-convert {{PATH}} -resize 300% -negate - | tesseract - - --psm 6}"
        mode="${HWLEDGER_TAPE_GATE:-strict}"
        total_fail=0
        total_violations=0
        for m in "$MANIFESTS_DIR"/*/manifest.verified.json; do
          [ -f "$m" ] || continue
          journey=$(basename "$(dirname "$m")")
          out=$(${BIN} assert "$m" --artefacts apps/cli-journeys --strict 2>&1) || true
          count=$(printf "%s" "$out" | grep -cE "^\s+step " || true)
          if [ "$count" -gt 0 ]; then
            total_fail=$((total_fail + 1))
            total_violations=$((total_violations + count))
            if [ "$mode" = "strict" ]; then
              echo "FAIL ${journey}: ${count} violations (strict)"
              printf "%s\n" "$out"
            else
              echo "WARN ${journey}: ${count} violations (gate=warn)"
            fi
          fi
        done
        if [ "$total_fail" -gt 0 ]; then
          echo ""
          echo "tape-assertions: ${total_fail} journeys with ${total_violations} total violations"
        fi
        if [ "$mode" = "strict" ]; then
          exit $total_fail
        fi
        # warn mode: always pass; violations are surfaced but non-blocking
        exit 0

    traceability-journeys:
      # Enforce FR-TRACE-003: every FR tagged [journey_kind: ...] must have a
      # verified journey manifest tracing back to it, no orphans, no low scores.
      # Shares warn/strict mode with tape-assertions via HWLEDGER_TAPE_GATE.
      # In warn mode, NotPassed rows (real violations) are reported but don't
      # block; missing journeys and orphan traces_to references still fail
      # because those are structural, not content, bugs.
      run: |
        set -euo pipefail
        mode="${HWLEDGER_TAPE_GATE:-warn}"
        flags="--strict-journeys"
        if [ "$mode" = "warn" ]; then
          flags="$flags --allow-not-passed"
        fi
        cargo run --quiet -p hwledger-traceability -- --repo . $flags

    shot-linter:
      # Gate: every `<Shot src=...>` in docs-site/**/*.md must OCR-match at
      # least one caption token. Strict in `HWLEDGER_TAPE_GATE=strict`; warn
      # otherwise. Runs without `--apply` so it never silently rewrites docs
      # during push. Requires `tesseract` on PATH; missing tesseract degrades
      # to `--no-ocr` (records but does not assert).
      run: |
        set -euo pipefail
        mode="${HWLEDGER_TAPE_GATE:-warn}"
        flags=""
        if ! command -v tesseract >/dev/null 2>&1; then
          flags="--no-ocr"
        fi
        if [ "$mode" = "strict" ]; then
          cargo run --quiet -p hwledger-shot-linter -- --strict $flags
        else
          cargo run --quiet -p hwledger-shot-linter -- $flags
        fi

    swift-main:
      root: "apps/macos/HwLedger"
      run: |
        if [ -d "../xcframework/HwLedgerCore.xcframework" ]; then
          swift build
        else
          echo "XCFramework missing — skip Swift build (run scripts/build-xcframework.sh first)"
        fi

    attest-build:
      # Local-CI attestation: after the above gates have passed, emit a
      # signed, hash-chained manifest to .hwledger/attestations.log. The
      # (self-hosted) GitHub Actions workflow `attestation-gate.yml` verifies
      # this manifest instead of re-running the gates (GitHub Actions billing
      # is exhausted — local-CI IS the CI). First-run:
      #   cargo run -p hwledger-attest -- genkey default
      # See docs-site/quality/attestation.md.
      run: |
        set -euo pipefail
        if [ -n "${HWLEDGER_SKIP_ATTEST:-}" ]; then
          echo "HWLEDGER_SKIP_ATTEST set — skipping attestation (dev escape)"
          exit 0
        fi
        KEY_ID="${HWLEDGER_ATTEST_KEY_ID:-default}"
        KEY_DIR="${HWLEDGER_ATTEST_KEY_DIR:-$HOME/.hwledger/attest-keys}"
        if [ ! -f "${KEY_DIR}/${KEY_ID}.sk" ]; then
          echo "No attestation key for '${KEY_ID}' in ${KEY_DIR}."
          echo "Run: cargo run -p hwledger-attest -- genkey ${KEY_ID}"
          exit 1
        fi
        cargo run --quiet -p hwledger-attest --bin hwledger-attest -- build --key-id "${KEY_ID}" --synthetic >/dev/null

    attest-verify-push:
      # Reject the push if HEAD has no attestation or the chain is broken.
      run: |
        set -euo pipefail
        if [ -n "${HWLEDGER_SKIP_ATTEST:-}" ]; then exit 0; fi
        cargo run --quiet -p hwledger-attest --bin hwledger-attest -- verify-push --local-ref HEAD

    release-tag:
      # Detect v* tags being pushed without re-invoking `git push` (infinite
      # hook loop). Read stdin that git pipes to pre-push: lines look like
      # "<local-ref> <local-sha> <remote-ref> <remote-sha>". Tags arrive as
      # refs/tags/v*.
      run: |
        if [ -n "${LEFTHOOK_SKIP_RELEASE:-}" ]; then exit 0; fi
        TAG=""
        while read -r local_ref _ remote_ref _; do
          case "$remote_ref" in
            refs/tags/v*)
              TAG="${remote_ref#refs/tags/}"
              break
              ;;
          esac
        done < /dev/stdin
        if [ -n "$TAG" ]; then
          echo "Release tag $TAG detected — running local release pipeline"
          LEFTHOOK_SKIP_RELEASE=1 ./scripts/release.sh "$TAG"
        fi
