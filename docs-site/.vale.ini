[*]
BasedOnStyles = Microsoft
Vocab = hwLedger

[*.md]
# Core Microsoft style
Microsoft.Exclamation = NO
Microsoft.Headings = YES
Microsoft.Quotes = NO
Microsoft.RangeFormat = NO
Microsoft.Spacing = YES

# Extended rules
Alex.Condescending = YES
Alex.ProfanityLegit = NO
